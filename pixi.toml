[workspace]
authors = ["luisgustavopereiraf@gmail.com <luisgustavopereiraf@gmail.com>"]
channels = ["conda-forge"]
name = "computer-vision"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
start = "python src/main.py"
test = "python compatibilityTest.py"

[dependencies]
python = "3.12.5.*"

[pypi-dependencies]
certifi = "==2025.7.14"
charset-normalizer = "==3.4.2"
colorama = "==0.4.6"
contourpy = "==1.3.3"
cycler = "==0.12.1"
dotenv = "==0.9.9"
filelock = "==3.18.0"
fonttools = "==4.59.1"
fsspec = "==2025.7.0"
idna = "==3.10"
imageio = "==2.37.0"
Jinja2 = "==3.1.6"
kiwisolver = "==1.4.9"
lazy_loader = "==0.4"
MarkupSafe = "==3.0.2"
matplotlib = "==3.10.5"
mpmath = "==1.3.0"
networkx = "==3.5"
ninja = "==1.11.1.4"
numpy = "==2.2.6"
opencv-python = "==4.12.0.88"
opencv-python-headless = "==4.12.0.88"
packaging = "==25.0"
pandas = "==2.3.2"
pillow = "==11.3.0"
psutil = "==7.0.0"
py-cpuinfo = "==9.0.0"
pyclipper = "==1.3.0.post6"
pyparsing = "==3.2.3"
python-bidi = "==0.6.6"
python-dateutil = "==2.9.0.post0"
python-dotenv = "==1.1.1"
pytz = "==2025.2"
PyYAML = "==6.0.2"
requests = "==2.32.4"
scikit-image = "==0.25.2"
scipy = "==1.16.0"
setuptools = "==80.9.0"
shapely = "==2.1.1"
six = "==1.17.0"
sympy = "==1.14.0"
tifffile = "==2025.6.11"
tqdm = "==4.67.1"
typing_extensions = "==4.14.1"
tzdata = "==2025.2"
ultralytics = "==8.3.185"
ultralytics-thop = "==2.0.16"
urllib3 = "==2.5.0"

[pypi-options]
index-strategy = "unsafe-best-match"

# NVIDIA (CUDA)
[feature.cuda.pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu118"]

[feature.cuda.pypi-dependencies]
torch = "==2.7.1+cu118"
torchvision = "==0.22.1+cu118"

# AMD (ROCm)
[feature.rocm.pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/rocm6.1"]

[feature.rocm.pypi-dependencies]
torch = "*"
torchvision = "*"

[environments]
default = ["rocm"]
cuda = ["cuda"]